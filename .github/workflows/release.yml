name: Create GitHub Release

on:
  push:
    branches:
      - 'rel-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION="${BRANCH_NAME#rel-}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$BRANCH_NAME" ]; then
            echo "Unable to determine version from branch '$BRANCH_NAME'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create integration package (zip)
        shell: bash
        run: |
          INTEGRATION_FOLDER="custom_components/ha_device_status"
          if [ ! -d "$INTEGRATION_FOLDER" ]; then
            echo "Integration folder '$INTEGRATION_FOLDER' not found!"
            exit 1
          fi

          # HACS zip releases must contain the integration's files at the
          # archive ROOT (manifest.json, __init__.py, ...). Zipping the
          # custom_components/ha_device_status/ path itself causes HACS to
          # install it doubled-up as
          # custom_components/ha_device_status/custom_components/ha_device_status/.
          ( cd "$INTEGRATION_FOLDER" && zip -r "$OLDPWD/ha_device_status.zip" . -x '__pycache__/*' '*.pyc' )

          if ! unzip -l ha_device_status.zip | grep -qE '^\s*[0-9]+.*\smanifest\.json$'; then
            echo "Archive does not contain manifest.json at its root!"
            exit 1
          fi
          if unzip -l ha_device_status.zip | grep -q 'custom_components/'; then
            echo "Archive incorrectly contains a nested custom_components/ path!"
            exit 1
          fi

          echo "Created ha_device_status.zip"

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ha_device_status.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}