name: Create GitHub Release

on:
  push:
    branches:
      - 'rel-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION="${BRANCH_NAME#rel-}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$BRANCH_NAME" ]; then
            echo "Unable to determine version from branch '$BRANCH_NAME'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create integration package (zip)
        shell: bash
        run: |
          # Adjust the folder name if your integration is named differently
          INTEGRATION_FOLDER="custom_components/network_monitor"
          if [ ! -d "$INTEGRATION_FOLDER" ]; then
            echo "Integration folder '$INTEGRATION_FOLDER' not found!"
            exit 1
          fi
          # Zip the integration folder so the archive root contains the folder
          cd custom_components
          zip -r ../network_monitor.zip network_monitor/
          echo "Created network_monitor.zip"

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            network_monitor.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}